<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React concept in vanala Js</title>
  </head>
  <body>
    <h1>Counter <span id="count_id">0</span></h1>
    <button id="btnInc">Count ++</button>
    <button id="btnDec">Count --</button>

    <script>
      let count = 0;
      let countSpan = document.getElementById("count_id");
      let btnInc = document.getElementById("btnInc");
      let btndec = document.getElementById("btnDec");

      function increment() {
        count++;
        countSpan.textContent = count;
      }

      function decrement() {
        if (count === 0) return 0;
        count--;
        countSpan.textContent = count;
      }

      btnInc.addEventListener("click", increment);
      btndec.addEventListener("click", decrement);
    </script>
  </body>
</html>
